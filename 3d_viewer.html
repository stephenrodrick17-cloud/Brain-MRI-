
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="utf-8">
            <title>3D Medical Image Reconstruction</title>
            <style>
                body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
                #canvas { display: block; }
                #info {
                    position: absolute;
                    inset-block-start: 10px;
                    inset-inline-start: 10px;
                    background: rgba(0, 0, 0, 0.7);
                    color: white;
                    padding: 15px;
                    border-radius: 5px;
                    max-inline-size: 400px;
                    z-index: 100;
                    font-size: 12px;
                }
                #findings {
                    position: absolute;
                    inset-block-end: 10px;
                    inset-inline-start: 10px;
                    background: rgba(0, 0, 0, 0.7);
                    color: white;
                    padding: 15px;
                    border-radius: 5px;
                    max-inline-size: 400px;
                    z-index: 100;
                }
                .label { font-weight: bold; color: #4CAF50; }
            </style>
        </head>
        <body>
            <canvas id="canvas"></canvas>
            <div id="info">
                <h3>3D Reconstruction Information</h3>
        <div class='label'>Patient Info:</div><div>Name: Sample Patient</div><div>ID: SAMPLE001</div>
                <div><span class='label'>Dimensions:</span> 32�256�256 voxels</div>
                <div><span class='label'>Thickness:</span> 10.0 mm</div>
                <div><span class='label'>Method:</span> 3D CNN Prediction</div>
                <br>
                <div style='font-size: 10px; color: #ccc;'>
                    Drag to rotate | Scroll to zoom | Right-click to pan
                </div>
            </div>
        
            <div id="findings">
                <div class='label'>Clinical Findings:</div>
                <div>Generated for demonstration</div>
            </div>
            
            <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
            <script>
                // Basic 3D visualization setup
                const canvas = document.getElementById('canvas');
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x1a1a1a);
                
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(0, 0, 150);
                
                const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                
                // Add lighting
                const light1 = new THREE.PointLight(0xffffff, 1, 1000);
                light1.position.set(100, 100, 100);
                scene.add(light1);
                
                const light2 = new THREE.AmbientLight(0x404040);
                scene.add(light2);
                
                // Create simple 3D representation (volumetric wireframe)
                const geometry = new THREE.BoxGeometry(100, 100, 80);
                const material = new THREE.MeshPhongMaterial({
                    color: 0x2196F3,
                    emissive: 0x003d7a,
                    specular: 0x111111,
                    shininess: 200,
                    wireframe: true
                });
                const cube = new THREE.Mesh(geometry, material);
                scene.add(cube);
                
                // Mouse controls
                let isDragging = false;
                let previousMousePosition = { x: 0, y: 0 };
                
                canvas.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                });
                
                canvas.addEventListener('mousemove', (e) => {
                    if (isDragging) {
                        const deltaX = e.clientX - previousMousePosition.x;
                        const deltaY = e.clientY - previousMousePosition.y;
                        
                        cube.rotation.y += deltaX * 0.01;
                        cube.rotation.x += deltaY * 0.01;
                        
                        previousMousePosition = { x: e.clientX, y: e.clientY };
                    }
                });
                
                canvas.addEventListener('mouseup', () => { isDragging = false; });
                canvas.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    camera.position.z += e.deltaY * 0.5;
                }, false);
                
                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });
                
                function animate() {
                    requestAnimationFrame(animate);
                    renderer.render(scene, camera);
                }
                animate();
            </script>
        </body>
        </html>
